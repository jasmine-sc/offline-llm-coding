<!DOCTYPE HTML>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pixel Bird Clone</title>
  <style>
    body {
      background-color: #f0f0f0; /* Light gray background */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh; /* Make the body take up the entire viewport height */
    }

    .bird {
      position: absolute;
      width: 50px;
      height: 50px;
      background-color: #3498db; /* Blue color for the bird */
      border-radius: 50%;
      animation: flap 1s linear infinite;
    }

    .flap {
      width: 20px;
      height: 20px;
      background-color: #ff69b4; /* Orange color for the flap */
      border-radius: 50%;
      animation: flap 1s linear infinite;
    }

    @keyframes flap {
      0% { transform: scale(0); }
      50% { transform: scale(1); }
      100% { transform: scale(0.7); }
    }

  </style>
</head>
<body>

  <div class="bird"></div>

</body>
</html>
